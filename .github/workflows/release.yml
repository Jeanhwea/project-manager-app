name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: pma
            asset_name: pma-linux-x86_64
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: pma.exe
            asset_name: pma-windows-x86_64
            archive_ext: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact_name: pma.exe
            asset_name: pma-windows-arm64
            archive_ext: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: pma
            asset_name: pma-macos-x86_64
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: pma
            asset_name: pma-macos-arm64
            archive_ext: tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Extract version
        id: meta
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "archive=${{ matrix.asset_name }}-$VERSION.${{ matrix.archive_ext }}" >> $GITHUB_OUTPUT

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p output
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} output/
          cd output
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a -tzip ${{ steps.meta.outputs.archive }} ${{ matrix.artifact_name }}
          else
            tar -czf ${{ steps.meta.outputs.archive }} ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset_name }}
          path: output/${{ steps.meta.outputs.archive }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
