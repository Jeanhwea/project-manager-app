name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
            artifact_name: pma
            asset_name: pma-linux
            archive_ext: tar.gz
          - target: windows
            os: windows-latest
            artifact_name: pma.exe
            asset_name: pma-windows
            archive_ext: zip
          - target: macos
            os: macOS-latest
            artifact_name: pma
            asset_name: pma-macos
            archive_ext: tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version
        id: meta
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "archive=${{ matrix.asset_name }}-$VERSION.${{ matrix.archive_ext }}" >> $GITHUB_OUTPUT

      - name: Build
        run: cargo build --release

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p output
          cp target/release/${{ matrix.artifact_name }} output/
          cd output
          if [ "${{ matrix.target }}" = "windows" ]; then
            7z a -tzip ${{ steps.meta.outputs.archive }} ${{ matrix.artifact_name }}
          else
            tar -czf ${{ steps.meta.outputs.archive }} ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: output/${{ steps.meta.outputs.archive }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}