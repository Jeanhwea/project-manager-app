name: Publish to npm

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to latest (Trusted Publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install pandoc for README conversion
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert readme.org to readme.md
        run: pandoc readme.org --to=gfm -o npm/pma/readme.md

      - name: Extract version
        id: meta
        shell: bash
        run: |
          VERSION=$(echo "${{ github.event.workflow_run.head_branch }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package versions
        shell: bash
        run: |
          VERSION=${{ steps.meta.outputs.version }}

          # Update all platform packages
          for pkg in pma-linux-x64 pma-win32-x64 pma-win32-arm64 pma-darwin-x64 pma-darwin-arm64; do
            cd npm/$pkg
            npm version $VERSION --no-git-tag-version --allow-same-version
            cd ../..
          done

          # Update main package and its optionalDependencies
          cd npm/pma
          npm version $VERSION --no-git-tag-version --allow-same-version
          # Update optionalDependencies versions using jq
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.optionalDependencies |= with_entries(.value = $v)' package.json > "$tmp" && mv "$tmp" package.json
          cd ../..

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          mkdir -p artifacts
          gh release download "v${VERSION}" --dir artifacts --repo ${{ github.repository }}

      - name: Prepare platform packages
        shell: bash
        run: |
          VERSION=${{ steps.meta.outputs.version }}

          mkdir -p npm/pma-linux-x64/bin
          tar -xzf artifacts/pma-linux-x86_64-v${VERSION}.tar.gz -C npm/pma-linux-x64/bin

          mkdir -p npm/pma-win32-x64/bin
          unzip -o artifacts/pma-windows-x86_64-v${VERSION}.zip -d npm/pma-win32-x64/bin

          mkdir -p npm/pma-win32-arm64/bin
          unzip -o artifacts/pma-windows-arm64-v${VERSION}.zip -d npm/pma-win32-arm64/bin

          mkdir -p npm/pma-darwin-x64/bin
          tar -xzf artifacts/pma-macos-x86_64-v${VERSION}.tar.gz -C npm/pma-darwin-x64/bin

          mkdir -p npm/pma-darwin-arm64/bin
          tar -xzf artifacts/pma-macos-arm64-v${VERSION}.tar.gz -C npm/pma-darwin-arm64/bin

      - name: Publish platform packages
        shell: bash
        run: |
          for pkg in pma-linux-x64 pma-win32-x64 pma-win32-arm64 pma-darwin-x64 pma-darwin-arm64; do
            cd npm/$pkg
            npm publish --access public --provenance
            cd ../..
          done

      - name: Publish main package
        run: |
          cd npm/pma
          npm publish --access public --provenance
